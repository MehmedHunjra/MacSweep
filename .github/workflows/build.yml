name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build MacSweep
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project MacSweep.xcodeproj \
            -scheme MacSweep \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || true

      - name: Check for build errors
        run: |
          xcodebuild \
            -project MacSweep.xcodeproj \
            -scheme MacSweep \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | grep -E "error:|BUILD FAILED|BUILD SUCCEEDED" | tail -5
